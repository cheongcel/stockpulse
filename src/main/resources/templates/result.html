<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockPulse - 분석 결과</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2563EB; }
        .result-box { background: #F0F4FF; padding: 20px; border-radius: 8px; margin: 10px 0; }
        .news-item { border-left: 3px solid #2563EB; padding-left: 10px; margin: 8px 0; }
        a { color: #2563EB; }
    </style>
</head>
<body>
<h1>📊 <span th:text="${ticker}"></span> AI 분석 결과</h1>

<h2>최신 뉴스</h2>
<div th:each="title : ${titles}">
    <div class="news-item" th:text="${title}"></div>
</div>

<h2>AI 분석</h2>
<div class="result-box">
    <pre th:text="${aiResult}"></pre>
</div>

<a href="/">← 돌아가기</a>
</body>
</html>
