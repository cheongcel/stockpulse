<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>StockPulse</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #fff; }

        .ticker-wrap {
            width: 100vw;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
            overflow: hidden;
            background: #0a0a0a;
            padding: 13px 0;
        }
        .ticker-track {
            display: flex;
            white-space: nowrap;
            width: max-content;
            animation: ticker 35s linear infinite;
        }
        .ticker-item {
            font-size: 13px;
            color: #e0e0e0;
            padding: 0 40px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }
        .ticker-sep { color: #444; padding: 0; flex-shrink: 0; }
        @keyframes ticker {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .main {
            max-width: 860px;
            margin: 0 auto;
            padding: 3rem 2.5rem 3rem;
        }

        .wordmark {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        .wordmark-pulse {
            width: 11px; height: 11px; border-radius: 50%;
            background: #378ADD;
            animation: blink 1.8s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.35; transform: scale(0.6); }
        }
        h1 {
            font-size: 56px;
            font-weight: 500;
            color: #111;
            letter-spacing: -2.5px;
            line-height: 1;
        }
        h1 span { color: #378ADD; }

        .tagline {
            font-size: 13px;
            color: #888;
            margin-left: 23px;
            margin-bottom: 2.5rem;
        }

        .section-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: #aaa;
            margin-bottom: 14px;
        }

        .form-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .form-stack input {
            font-size: 12px;
            border: 0.5px solid #ccc;
            border-radius: 0;
            padding: 9px 12px;
            background: #fff;
            color: #111;
            outline: none;
            display: block;
        }
        .form-stack input:focus { border-color: #378ADD; }
        .input-short { width: 260px; }
        .input-long  { width: 340px; }

        .submit-btn {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            padding: 8px 22px;
            background: #0a0a0a;
            color: #fff;
            border: none;
            border-radius: 0;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.03em;
        }
        .submit-btn:hover { background: #2a2a2a; }

        hr.divider {
            border: none;
            border-top: 0.5px solid #e5e5e5;
            margin: 2.5rem 0;
        }

        .stock-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .stock-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 0.5px solid #e5e5e5;
            padding: 7px 12px;
        }
        .stock-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .stock-badge {
            font-size: 10px;
            font-weight: 600;
            background: #0a0a0a;
            color: #fff;
            padding: 2px 7px;
            letter-spacing: 0.07em;
        }
        .stock-link {
            font-size: 11px;
            color: #378ADD;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .stock-link:hover { color: #185FA5; }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 12px;
            padding: 10px 14px;
            margin-bottom: 1.5rem;
            border-left: 2px solid #2e7d32;
        }


        /* ── 로딩 오버레이 ── */
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.85);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .loading-overlay.show { display: flex; }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2.5px solid #e5e5e5;
            border-top-color: #378ADD;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size: 12px;
            color: #888;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">AI가 뉴스를 분석하고 있어요...</p>
</div>

<div class="ticker-wrap">
    <div class="ticker-track" id="top-track"></div>
</div>

<div class="main">
    <div class="wordmark">
        <div class="wordmark-pulse"></div>
        <h1>Stock<span>Pulse</span></h1>
    </div>
    <p class="tagline">AI가 매일 아침 관심 키워드 뉴스를 분석해서 이메일로 보내드려요</p>
    <div class="success-msg" th:if="${successMsg}" th:text="${successMsg}"></div>

    <p class="section-label">키워드 구독</p>
    <form th:action="@{/subscribe}" method="post">
        <div class="form-stack">
            <input class="input-short" type="text" name="keyword"
                   placeholder="키워드 (예: 삼성전자, 비트코인, 금리)" required/>
            <input class="input-long" type="email" name="email"
                   placeholder="이메일 주소" required/>
        </div>
        <button type="submit" class="submit-btn">구독하기</button>
    </form>

    <hr class="divider"/>

    <p class="section-label">구독 중인 키워드</p>
    <div class="stock-list" id="stock-list">
        <div class="stock-row" th:each="stock : ${stocks}">
            <div class="stock-left">
                <span class="stock-badge" th:text="${stock.keyword}"></span>
            </div>
            <a class="stock-link"
               th:href="@{/analyze/{k}(k=${stock.keyword})}"
               onclick="showLoading()">
                AI 분석 보기 →
            </a>
        </div>
    </div>
</div>

<div class="ticker-wrap">
    <div class="ticker-track" id="bottom-track"></div>
</div>

<script>
    function showLoading() {
        document.getElementById('loading-overlay').classList.add('show');
    }

    const TOP = [
        "StockPulse — AI 기반 뉴스 감성 분석 서비스",
        "관심 키워드를 등록하면 매일 아침 뉴스 요약을 보내드려요",
        "삼성전자 · 비트코인 · 금리 · 환율 — 원하는 키워드 구독",
        "AI가 뉴스 감성을 분석해 투자 판단을 도와드려요",
        "오늘의 시장 코멘트: Fed 발언 앞두고 관망세 지속",
        "글로벌 ETF 분석 리포트 — 주간 무료 발송 신청",
        "환율·금리·원자재 — 매크로 지표 요약도 함께 받아보세요",
    ];
    const BOT = [
        "실시간 공시 알림 — DART 연동 베타 서비스 오픈",
        "이메일 말고 슬랙으로도 받아보세요 — Slack 연동 지원",
        "미국·한국·일본 3개국 주요 종목 커버리지 확대 예정",
        "AI 요약 리포트 예시 보기 — 지금 무료 체험 신청",
        "주간 포트폴리오 성과 요약 — 매주 월요일 발송",
        "종목 알림 커스텀 설정 — 원하는 조건만 골라 받기",
        "네이버 뉴스 기반 실시간 키워드 분석 서비스",
    ];

    function build(items) {
        const pool = [...items, ...items, ...items, ...items, ...items, ...items];
        return pool.map(t =>
            `<span class="ticker-item">${t}</span><span class="ticker-sep">—</span>`
        ).join('');
    }

    document.getElementById('top-track').innerHTML = build(TOP);
    document.getElementById('bottom-track').innerHTML = build(BOT);
</script>
</body>
</html>
